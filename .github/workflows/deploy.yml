name: Deploy Next.js

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0 
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/realproxynextjs
            if [ ! -d ".git" ]; then
              git clone https://github.com/Md-Abu-Rayhan/real-proxy-nextjs.git .
            else
              git pull origin main
            fi
            npm install
            npm run build
            pm2 restart realproxynextjs || pm2 start ecosystem.config.js
            pm2 save